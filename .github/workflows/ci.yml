name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Ruby ${{ matrix.ruby }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        ruby: ['3.4.3', '4.0.3', 'head']
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rake

  test-bigendian:
    name: Big-endian (s390x via QEMU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: s390x
      - name: Run tests inside s390x container
        run: |
          docker run --rm --platform linux/s390x \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            ruby:3.4 \
            sh -c "gem install bundler --no-document && bundle install && bundle exec rake"

  test-msvc-avx:
    name: MSVC + AVX (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Compile AVX popcount test with MSVC
        run: cl /nologo /arch:AVX /O2 /Fe:avx_test.exe test\msvc_avx_test.c
        shell: cmd
      - name: Run AVX popcount test
        run: .\avx_test.exe
        shell: cmd

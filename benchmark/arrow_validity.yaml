prelude: |
  $LOAD_PATH.unshift File.expand_path('lib')
  require 'string_bits'
  srand(42)
  N_ROWS   = 1_000_000
  VALIDITY = Array.new(N_ROWS / 8) { rand(256) }.pack("C*")
  VALUES   = Array.new(N_ROWS) { rand(1000) }

benchmark:
  baseline: |
    sum = 0
    VALIDITY.each_byte.with_index do |byte, bi|
      base = bi * 8
      8.times { |bit| sum += VALUES[base + bit] if (byte >> bit) & 1 == 1 }
    end
    sum
  string_bits: |
    sum = 0
    VALIDITY.each_set_bit(order: :lsb) { |i| sum += VALUES[i] }
    sum

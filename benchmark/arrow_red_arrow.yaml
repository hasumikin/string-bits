# Requires: red-arrow gem and Apache Arrow C++ libraries.
# See https://arrow.apache.org/install/ and `gem install red-arrow`.
# Skipped automatically by `rake benchmark` if red-arrow is not available.
prelude: |
  $LOAD_PATH.unshift File.expand_path('lib')
  require 'arrow'
  require 'string_bits'
  srand(42)
  N    = 100_000
  data = Array.new(N) { rand < 0.5 ? nil : rand(1000) }
  COL  = Arrow::Int32Array.new(data)
  BITMAP = (0.chr * ((N + 7) / 8)).b
  data.each_with_index { |v, i| BITMAP.set_bit(i) if v }

benchmark:
  baseline: |
    sum = 0
    data.each { |v| sum += v if v }
    sum
  string_bits: |
    sum = 0
    BITMAP.each_set_bit_offset(lsb_first: true) { |i| sum += data[i] }
    sum
  arrow: |
    COL.sum

prelude: |
  $LOAD_PATH.unshift File.expand_path('lib')
  require 'string_bits'
  srand(42)
  A = Random.bytes(125_000)
  B = Random.bytes(125_000)
  BIT_COUNT_TABLE = Array.new(256) { |i| i.to_s(2).count("1") }.freeze

benchmark:
  baseline: |
    intersection = 0
    union_count  = 0
    A.each_byte.with_index do |a_byte, i|
      b_byte = B.getbyte(i)
      intersection += BIT_COUNT_TABLE[a_byte & b_byte]
      union_count  += BIT_COUNT_TABLE[a_byte | b_byte]
    end
    intersection.to_f / union_count
  string_bits: A.bit_and(B).bit_count.to_f / A.bit_or(B).bit_count
